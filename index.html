<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARUNA PRAMOD | OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- High-End Neon Mesh Background --- */
        .bg-mesh {
            position: fixed; top: -50%; left: -50%; width: 200vw; height: 200vh; z-index: -1;
            background: radial-gradient(circle at center, rgba(0, 149, 246, 0.15) 0%, rgba(131, 58, 180, 0.15) 40%, rgba(0,0,0,1) 80%);
            animation: mesh-rotate 20s linear infinite;
        }
        @keyframes mesh-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 60px 20px 20px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        
        .app-container::-webkit-scrollbar { display: none; }

        /* --- Profile Header --- */
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar-wrap { width: 115px; height: 115px; margin: 0 auto 18px auto; }
        .avatar-wrap img {
            width: 100%; height: 100%; border-radius: 38%; object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .name { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
        .verified-icon { width: 24px; height: 24px; fill: #0095f6; }

        .bio-info { font-size: 10px; color: #666; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .job-tag { font-size: 12px; color: #0095f6; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        /* --- Quote Card --- */
        .quote-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 26px;
            padding: 24px;
            margin-bottom: 35px;
            text-align: center;
        }
        .quote-card p { font-size: 14px; line-height: 1.7; color: #aaa; font-weight: 300; }
        .quote-card span { color: #fff; font-weight: 700; }

        /* --- Links Container --- */
        .links-container { display: flex; flex-direction: column; gap: 14px; padding-bottom: 40px; }

        .link-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 22px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .link-btn:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.08); }

        .icon-box {
            width: 48px; height: 48px; border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; margin-right: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .link-btn.tt .icon-box { background: #000; border: 1px solid #222; }
        .link-btn.fb .icon-box { background: #1877f2; }
        .link-btn.ig .icon-box { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .link-btn.x .icon-box { background: #000; border: 1px solid #222; }
        .link-btn.li .icon-box { background: #0077b5; }

        .link-text { flex-grow: 1; }
        .link-title { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        .link-sub { font-size: 11px; color: #777; font-weight: 500; }

        .arrow { color: #222; font-size: 14px; opacity: 0.5; }

        footer { text-align: center; font-size: 9px; color: #333; font-weight: 700; letter-spacing: 4px; padding-bottom: 30px; }

        @media (min-width: 600px) {
            .app-container { height: 90vh; border-radius: 40px; border: 10px solid #111; background: rgba(0,0,0,0.7); }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="app-container">
        
        <div class="profile-header">
            <div class="avatar-wrap">
                <img src="1770829522007.jpg" alt="Aruna Pramod">
            </div>
            <div class="name-container">
                <h1 class="name">ARUNA PRAMOD</h1>
                <svg class="verified-icon" viewBox="0 0 24 24"><path d="M22.5 12.5c0-1.58-.88-2.95-2.18-3.66.15-.44.23-.91.23-1.4 0-2.45-1.99-4.44-4.44-4.44-.49 0-.96.08-1.4.23-1.17-1.3-2.35-2.23-3.66-2.23s-2.49.93-3.66 2.23c-.44-.15-.91-.23-1.4-.23-2.45 0-4.44 1.99-4.44 4.44 0 .49.08.96.23 1.4-1.3.71-2.18 2.08-2.18 3.66 0 1.58.88 2.95 2.18 3.66-.15.44-.23.91-.23 1.4 0 2.45 1.99 4.44 4.44 4.44.49 0 .96-.08 1.4-.23 1.17 1.3 2.35 2.23 3.66 2.23s2.49-.93 3.66-2.23c.44.15.91.23 1.4.23 2.45 0 4.44-1.99 4.44-4.44 0-.49-.08-.96-.23-1.4 1.3-.71 2.18-2.08 2.18-3.66zm-12.7 4.1l-3.3-3.3 1.4-1.4 1.9 1.9 4.9-4.9 1.4 1.4-6.3 6.3z"></path></svg>
            </div>
            
            <p class="bio-info">December 13</p>
            <p class="job-tag">Gamer • Python Developer</p>
        </div>

        <div class="quote-card">
            <p>"Focus on <span>Gaming</span>, not Girls.<br>Emotions are temporary, but Gaming is <span>permanent</span>"</p>
        </div>

        <div class="links-container">
            <a href="https://www.tiktok.com/@itsme_pramod" class="link-btn tt">
                <div class="icon-box"><i class="fa-brands fa-tiktok"></i></div>
                <div class="link-text">
                    <div class="link-title">TikTok</div>
                    <div class="link-sub">Digital Content Creator</div>
                </div>
            </a>

            <a href="https://web.facebook.com/pramodwickramanayaka" class="link-btn fb">
                <div class="icon-box"><i class="fa-brands fa-facebook-f"></i></div>
                <div class="link-text">
                    <div class="link-title">Facebook</div>
                    <div class="link-sub">Personal Profile</div>
                </div>
            </a>

            <a href="https://www.instagram.com/pramodwickramanayaka/" class="link-btn ig">
                <div class="icon-box"><i class="fa-brands fa-instagram"></i></div>
                <div class="link-text">
                    <div class="link-title">Instagram</div>
                    <div class="link-sub">Daily Moments</div>
                </div>
            </a>

            <a href="https://x.com/Rebornpramod" class="link-btn x">
                <div class="icon-box"><i class="fa-brands fa-x-twitter"></i></div>
                <div class="link-text">
                    <div class="link-title">X (Twitter)</div>
                    <div class="link-sub">Latest Updates</div>
                </div>
            </a>

            <a href="https://www.linkedin.com/in/aruna-pramod" class="link-btn li">
                <div class="icon-box"><i class="fa-brands fa-linkedin-in"></i></div>
                <div class="link-text">
                    <div class="link-title">LinkedIn</div>
                    <div class="link-sub">Professional Network</div>
                </div>
            </a>
        </div>

        <footer>EST 2021 • ARUNA PRAMOD</footer>
    </div>

</body>
</html>
